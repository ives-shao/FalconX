spring:
  application:
    name: falconx-market-service
  datasource:
    url: jdbc:mysql://localhost:3306/falconx_market?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${FALCONX_MARKET_DB_USERNAME}
    password: ${FALCONX_MARKET_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

server:
  port: 18082

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level --- [%15.15t] [traceId=%X{traceId:-}] %logger{39} : %msg%n%ex"

falconx:
  market:
    tiingo:
      enabled: true
      websocket-url: wss://api.tiingo.com/fx
      api-key: ${FALCONX_MARKET_TIINGO_API_KEY:182e49eb2c580dfaacbf0742f741ab8bf1d0cc9c}
      connect-timeout: 10s
      reconnect-interval: 5s
      trust-store-location:
      trust-store-password:
      trust-store-type: PKCS12
      symbol-whitelist-refresh-cron: "0 */1 * * * *"
      symbol-whitelist-refresh-zone: UTC
      crypto-symbol-import:
        enabled: false
        websocket-url: wss://api.tiingo.com/crypto
        connect-timeout: 10s
        sample-window: 10s
        allowed-exchanges:
          - binance
          - bitfinex
          - bitstamp
          - bybit
          - cryptodotcom
          - gdax
          - gemini
          - huobi
          - kraken
          - kucoin
          - mexc
          - okex
          - poloniex
        quote-currencies:
          - USDT
          - USDC
          - USD
          - EUR
        min-base-length: 2
        max-base-length: 12
    redis:
      quote-ttl: 10s
      trading-schedule-ttl: 25h
      trading-schedule-refresh-cron: "0 0 0 * * *"
      trading-schedule-refresh-zone: UTC
    analytics:
      database: falconx_market_analytics
      quote-batch-size: 200
      quote-flush-interval: 500
      jdbc-url: jdbc:clickhouse://localhost:8123/falconx_market_analytics
      username: default
      password:
    kafka:
      price-tick-topic: falconx.market.price.tick
      kline-update-topic: falconx.market.kline.update
    stale:
      max-age: 5s
    kline:
      intervals:
        - 1m
        - 5m
        - 15m
        - 1h
        - 4h
        - 1d
      timezone: UTC
