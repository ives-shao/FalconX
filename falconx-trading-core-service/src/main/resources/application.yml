spring:
  application:
    name: falconx-trading-core-service
  datasource:
    url: jdbc:mysql://localhost:3306/falconx_trading?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

server:
  port: 18083

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level --- [%15.15t] [traceId=%X{traceId:-}] %logger{39} : %msg%n%ex"

falconx:
  trading:
    settlement-token: USDT
    default-fee-rate: 0.0005
    maintenance-margin-rate: 0.005
    max-leverage: 100
    cache:
      quote-ttl: 10s
    swap:
      enabled: true
      settlement-cron: "*/1 * * * * *"
      settlement-zone: UTC
    kafka:
      market-price-tick-topic: falconx.market.price.tick
      market-kline-update-topic: falconx.market.kline.update
      wallet-deposit-confirmed-topic: falconx.wallet.deposit.confirmed
      wallet-deposit-reversed-topic: falconx.wallet.deposit.reversed
      deposit-credited-topic: falconx.trading.deposit.credited
      consumer-group-id: falconx-trading-core-service
