spring:
  application:
    name: falconx-identity-service
  datasource:
    url: jdbc:mysql://localhost:3306/falconx_identity?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${FALCONX_IDENTITY_DB_USERNAME}
    password: ${FALCONX_IDENTITY_DB_PASSWORD}
  data:
    redis:
      host: ${FALCONX_REDIS_HOST:localhost}
      port: ${FALCONX_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false
    consumer:
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  flyway:
    enabled: true
    locations: classpath:db/migration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

server:
  port: 18081

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level --- [%15.15t] [traceId=%X{traceId:-}] %logger{39} : %msg%n%ex"

falconx:
  identity:
    kafka:
      deposit-credited-topic: falconx.trading.deposit.credited
      consumer-group-id: falconx.identity-service.deposit-credited-consumer-group
    token:
      issuer: falconx-identity-service
      access-token-ttl: 15m
      refresh-token-ttl: 72h
    password:
      bcrypt-strength: 12
    security:
      login-failure-limit: 5
      login-lock-duration: 15m
      register-limit: 5
      register-window: 1h
    key-pair:
      private-key-pem: ${FALCONX_IDENTITY_PRIVATE_KEY_PEM}
      public-key-pem: ${FALCONX_IDENTITY_PUBLIC_KEY_PEM}
