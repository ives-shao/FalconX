spring:
  application:
    name: falconx-gateway
  data:
    redis:
      host: ${FALCONX_REDIS_HOST:localhost}
      port: ${FALCONX_REDIS_PORT:6379}

server:
  port: 18080

falconx:
  gateway:
    routes:
      identity-base-url: http://localhost:18081
      market-base-url: http://localhost:18082
      trading-base-url: http://localhost:18083
      wallet-base-url: http://localhost:18084
    security:
      public-key-pem: ${FALCONX_GATEWAY_PUBLIC_KEY_PEM}
      client-ip-header: X-Client-Ip
      auth-request-rate-limit-per-minute: 20
      connect-timeout-millis: 1000
      response-timeout-millis: 5000

resilience4j:
  circuitbreaker:
    instances:
      identity-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s
        permitted-number-of-calls-in-half-open-state: 5
        wait-duration-in-open-state: 10s
      market-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s
        permitted-number-of-calls-in-half-open-state: 5
        wait-duration-in-open-state: 10s
      trading-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s
        permitted-number-of-calls-in-half-open-state: 5
        wait-duration-in-open-state: 10s
      wallet-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s
        permitted-number-of-calls-in-half-open-state: 5
        wait-duration-in-open-state: 10s
