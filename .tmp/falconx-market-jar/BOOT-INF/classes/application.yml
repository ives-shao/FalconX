spring:
  application:
    name: falconx-market-service
  datasource:
    url: jdbc:mysql://localhost:3306/falconx_market?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

server:
  port: 18082

falconx:
  market:
    tiingo:
      enabled: true
      websocket-url: wss://api.tiingo.com/fx
      api-key: 182e49eb2c580dfaacbf0742f741ab8bf1d0cc9c
      connect-timeout: 10s
      reconnect-interval: 5s
      tickers:
        - EURUSD
    redis:
      quote-ttl: 10s
      trading-schedule-ttl: 25h
      trading-schedule-refresh-cron: "0 0 0 * * *"
      trading-schedule-refresh-zone: UTC
    analytics:
      database: falconx_market_analytics
      quote-batch-size: 200
      jdbc-url: jdbc:clickhouse://localhost:8123/falconx_market_analytics
      username: default
      password:
    kafka:
      price-tick-topic: falconx.market.price.tick
      kline-update-topic: falconx.market.kline.update
    stale:
      max-age: 5s
    kline:
      intervals:
        - 1m
        - 5m
        - 15m
        - 1h
        - 4h
        - 1d
      timezone: UTC
