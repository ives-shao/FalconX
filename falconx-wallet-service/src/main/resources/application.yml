spring:
  application:
    name: falconx-wallet-service
  datasource:
    url: jdbc:mysql://localhost:3306/falconx_wallet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  flyway:
    enabled: true
    locations: classpath:db/migration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

server:
  port: 18084

falconx:
  wallet:
    allocation:
      address-prefix: stub
      start-index: 1
    kafka:
      deposit-detected-topic: falconx.wallet.deposit.detected
      deposit-confirmed-topic: falconx.wallet.deposit.confirmed
      deposit-reversed-topic: falconx.wallet.deposit.reversed
    chains:
      eth:
        rpc-url: http://localhost:8545
        scan-interval: 5s
        required-confirmations: 12
        cursor-type: block
        initial-cursor: "0"
      bsc:
        rpc-url: http://localhost:8546
        scan-interval: 5s
        required-confirmations: 15
        cursor-type: block
        initial-cursor: "0"
      tron:
        rpc-url: http://localhost:8090
        solidity-rpc-url: http://localhost:8091
        scan-interval: 5s
        required-confirmations: 19
        cursor-type: block
        initial-cursor: "0"
      sol:
        rpc-url: http://localhost:8899
        scan-interval: 5s
        required-confirmations: 32
        cursor-type: slot
        initial-cursor: "0"
